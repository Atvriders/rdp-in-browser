Section "Device"
    Identifier  "dummy0"
    Driver      "dummy"
    VideoRam    262144
EndSection

Section "Monitor"
    Identifier  "Monitor0"
    HorizSync   28-80
    VertRefresh 48-75
    # 3840x1080 @ 60 Hz  (default: 2 × 1920x1080)
    Modeline "3840x1080" 266.75 3840 4080 4488 5136 1080 1083 1093 1120 -hsync +vsync
    # 2560x1440 @ 60 Hz  (2 × 1280x1440 — uncommon but possible)
    Modeline "2560x1440" 241.50 2560 2608 2640 2720 1440 1443 1448 1481 -hsync +vsync
    # 3840x2160 @ 60 Hz  (2 × 1920x2160)
    Modeline "3840x2160" 533.25 3840 4080 4488 5136 2160 2163 2168 2222 -hsync +vsync
    # 5120x1440 @ 60 Hz  (2 × 2560x1440)
    Modeline "5120x1440" 467.75 5120 5488 6040 6960 1440 1443 1453 1493 -hsync +vsync
EndSection

Section "Screen"
    Identifier  "Screen0"
    Device      "dummy0"
    Monitor     "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth    24
        # Large virtual desktop so any reasonable resolution fits
        Virtual  8192 4320
        Modes    "3840x1080" "2560x1440" "3840x2160" "5120x1440"
    EndSubSection
EndSection
