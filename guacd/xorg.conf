Section "ServerLayout"
    Identifier  "DualMonitor"
    Screen  0   "Screen0"  0    0
    Screen  1   "Screen1"  RightOf "Screen0"
    Option      "Xinerama" "on"
EndSection

Section "Monitor"
    Identifier  "Monitor0"
    HorizSync   28-80
    VertRefresh 48-75
EndSection

Section "Monitor"
    Identifier  "Monitor1"
    HorizSync   28-80
    VertRefresh 48-75
EndSection

Section "Device"
    Identifier  "Device0"
    Driver      "dummy"
    VideoRam    131072
EndSection

Section "Device"
    Identifier  "Device1"
    Driver      "dummy"
    VideoRam    131072
    Screen      1
EndSection

Section "Screen"
    Identifier  "Screen0"
    Device      "Device0"
    Monitor     "Monitor0"
    DefaultDepth 24
    SubSection "Display"
        Depth    24
        Modes    "1920x1080" "1280x720"
        Virtual  4096 2160
    EndSubSection
EndSection

Section "Screen"
    Identifier  "Screen1"
    Device      "Device1"
    Monitor     "Monitor1"
    DefaultDepth 24
    SubSection "Display"
        Depth    24
        Modes    "1920x1080" "1280x720"
        Virtual  4096 2160
    EndSubSection
EndSection
