services:
  guacd:
    image: guacamole/guacd:latest
    restart: unless-stopped
    ports:
      - "4822:4822"
    command: ["-f", "-L", "debug"]

  server:
    image: ghcr.io/atvriders/rdp-in-browser-server:master
    restart: unless-stopped
    ports:
      - "3001:3001"
    environment:
      - GUACD_HOST=guacd
      - GUACD_PORT=4822
      - PORT=3001
    depends_on:
      - guacd

  frontend:
    image: ghcr.io/atvriders/rdp-in-browser-frontend:master
    restart: unless-stopped
    ports:
      - "5173:80"
    depends_on:
      - server
